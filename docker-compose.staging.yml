# docker-compose.staging.yml — override para staging via IP (sem DNS/TLS)
# Uso: docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d --build

services:
  caddy:
    ports:
      - "8080:80"    # usa 8080 para não conflitar com outros apps na VPS
    volumes:
      - ./Caddyfile.staging:/etc/caddy/Caddyfile:ro
