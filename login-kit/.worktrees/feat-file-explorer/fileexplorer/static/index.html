<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arquivos — Lab Sobral</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- SVG sprite — ícones estáticos, sem dado de usuário -->
<svg style="display:none" aria-hidden="true">
  <defs>
    <!-- Pastas -->
    <symbol id="ico-folder" viewBox="0 0 18 16">
      <path d="M1 3h5l2 2h8a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" fill="#F5A623"/>
      <path d="M0 6.5h18v6a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1v-6z" fill="#D4881E"/>
    </symbol>
    <symbol id="ico-folder-open" viewBox="0 0 18 16">
      <path d="M1 3h5l2 2h8a1 1 0 0 1 1 1v1H0V4a1 1 0 0 1 1-1z" fill="#F5A623"/>
      <path d="M0 7.5h18L16 15H2z" fill="#D4881E"/>
    </symbol>
    <symbol id="ico-folder-shared" viewBox="0 0 18 16">
      <path d="M1 3h5l2 2h8a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" fill="#30D158"/>
      <path d="M0 6.5h18v6a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1v-6z" fill="#25A244"/>
      <circle cx="9" cy="10" r="1.8" fill="white"/>
      <path d="M5.5 14.5c0-1.933 1.567-2.5 3.5-2.5s3.5.567 3.5 2.5" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </symbol>
    <!-- Arquivos -->
    <symbol id="ico-pdf" viewBox="0 0 14 17">
      <path d="M1 0h8l5 5v11a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1V1a1 1 0 0 1 1-1z" fill="#E53E3E"/>
      <path d="M9 0l5 5H10a1 1 0 0 1-1-1z" fill="rgba(0,0,0,.22)"/>
      <text x="7" y="13.5" text-anchor="middle" fill="white" font-size="4.5" font-family="-apple-system,sans-serif" font-weight="700">PDF</text>
    </symbol>
    <symbol id="ico-word" viewBox="0 0 14 17">
      <path d="M1 0h8l5 5v11a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1V1a1 1 0 0 1 1-1z" fill="#2B579A"/>
      <path d="M9 0l5 5H10a1 1 0 0 1-1-1z" fill="rgba(0,0,0,.22)"/>
      <text x="7" y="13.5" text-anchor="middle" fill="white" font-size="7" font-family="-apple-system,sans-serif" font-weight="700">W</text>
    </symbol>
    <symbol id="ico-excel" viewBox="0 0 14 17">
      <path d="M1 0h8l5 5v11a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1V1a1 1 0 0 1 1-1z" fill="#217346"/>
      <path d="M9 0l5 5H10a1 1 0 0 1-1-1z" fill="rgba(0,0,0,.22)"/>
      <text x="7" y="13.5" text-anchor="middle" fill="white" font-size="7" font-family="-apple-system,sans-serif" font-weight="700">X</text>
    </symbol>
    <symbol id="ico-csv" viewBox="0 0 14 17">
      <path d="M1 0h8l5 5v11a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1V1a1 1 0 0 1 1-1z" fill="#217346"/>
      <path d="M9 0l5 5H10a1 1 0 0 1-1-1z" fill="rgba(0,0,0,.22)"/>
      <text x="7" y="13.5" text-anchor="middle" fill="white" font-size="4.5" font-family="-apple-system,sans-serif" font-weight="700">CSV</text>
    </symbol>
    <symbol id="ico-ppt" viewBox="0 0 14 17">
      <path d="M1 0h8l5 5v11a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1V1a1 1 0 0 1 1-1z" fill="#B7472A"/>
      <path d="M9 0l5 5H10a1 1 0 0 1-1-1z" fill="rgba(0,0,0,.22)"/>
      <text x="7" y="13.5" text-anchor="middle" fill="white" font-size="7" font-family="-apple-system,sans-serif" font-weight="700">P</text>
    </symbol>
    <symbol id="ico-image" viewBox="0 0 14 17">
      <path d="M1 0h8l5 5v11a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1V1a1 1 0 0 1 1-1z" fill="#805AD5"/>
      <path d="M9 0l5 5H10a1 1 0 0 1-1-1z" fill="rgba(0,0,0,.22)"/>
      <circle cx="5" cy="10" r="1.5" fill="rgba(255,255,255,.7)"/>
      <path d="M2 15l3-4 2 2 2-3 3 5z" fill="white"/>
    </symbol>
    <symbol id="ico-video" viewBox="0 0 14 17">
      <path d="M1 0h8l5 5v11a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1V1a1 1 0 0 1 1-1z" fill="#3182CE"/>
      <path d="M9 0l5 5H10a1 1 0 0 1-1-1z" fill="rgba(0,0,0,.22)"/>
      <polygon points="5,8 5,14 11,11" fill="white"/>
    </symbol>
    <symbol id="ico-archive" viewBox="0 0 14 17">
      <path d="M1 0h8l5 5v11a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1V1a1 1 0 0 1 1-1z" fill="#975A16"/>
      <path d="M9 0l5 5H10a1 1 0 0 1-1-1z" fill="rgba(0,0,0,.22)"/>
      <text x="7" y="13.5" text-anchor="middle" fill="white" font-size="4" font-family="-apple-system,sans-serif" font-weight="700">ZIP</text>
    </symbol>
    <symbol id="ico-txt" viewBox="0 0 14 17">
      <path d="M1 0h8l5 5v11a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1V1a1 1 0 0 1 1-1z" fill="#718096"/>
      <path d="M9 0l5 5H10a1 1 0 0 1-1-1z" fill="rgba(0,0,0,.22)"/>
      <line x1="3" y1="9" x2="11" y2="9" stroke="white" stroke-width="1"/>
      <line x1="3" y1="11.5" x2="9" y2="11.5" stroke="white" stroke-width="1"/>
    </symbol>
    <symbol id="ico-file" viewBox="0 0 14 17">
      <path d="M1 0h8l5 5v11a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1V1a1 1 0 0 1 1-1z" fill="#A0AEC0"/>
      <path d="M9 0l5 5H10a1 1 0 0 1-1-1z" fill="rgba(0,0,0,.22)"/>
    </symbol>
  </defs>
</svg>

  <header class="topbar">
    <span class="topbar-logo">🗂 WebServer de Arquivos</span>
    <div class="topbar-breadcrumb" id="breadcrumb"></div>
    <input type="text" id="search-input" placeholder="🔍 Buscar...">
    <div class="view-toggle">
      <button id="btn-list" class="active" title="Lista">☰</button>
      <button id="btn-grid" title="Grade">⊞</button>
    </div>
    <button id="btn-theme" class="btn-icon" title="Alternar tema">☀️</button>
    <span id="topbar-user" class="topbar-user"></span>
    <button id="btn-logout" class="btn-logout">Sair</button>
  </header>

  <div class="app-layout">
    <aside class="sidebar">

      <div class="sidebar-section">
        <div class="sidebar-label">Visão</div>
        <div class="tree-item" id="btn-dashboard">
          <span class="tree-icon"><svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true" focusable="false"><rect x="1" y="1" width="5" height="5" rx="1" fill="currentColor" opacity=".8"/><rect x="8" y="1" width="5" height="5" rx="1" fill="currentColor" opacity=".8"/><rect x="1" y="8" width="5" height="5" rx="1" fill="currentColor" opacity=".8"/><rect x="8" y="8" width="5" height="5" rx="1" fill="currentColor" opacity=".5"/></svg></span>
          <span>Dashboard</span>
        </div>
        <div class="tree-item active" id="btn-explorer">
          <span class="tree-icon"><svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true" focusable="false"><rect x="1" y="2" width="12" height="1.5" rx=".75" fill="currentColor"/><rect x="1" y="6" width="12" height="1.5" rx=".75" fill="currentColor"/><rect x="1" y="10" width="8" height="1.5" rx=".75" fill="currentColor"/></svg></span>
          <span>Explorador</span>
        </div>
      </div>
      <div class="sidebar-divider"></div>

      <div class="sidebar-section hidden" id="section-recents">
        <div class="sidebar-label">Recentes</div>
        <nav id="recents-list"></nav>
      </div>

      <div class="sidebar-section" id="section-favorites">
        <div class="sidebar-label">Favoritos</div>
        <nav id="favorites-list">
          <span class="sidebar-empty">Nenhum favorito</span>
        </nav>
      </div>

      <div class="sidebar-section hidden" id="section-shared">
        <div class="sidebar-label">Compartilhados comigo</div>
        <nav id="shared-list"></nav>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Diretórios</div>
        <nav id="tree"></nav>
      </div>

    </aside>

    <div class="resizer" id="resizer"></div>

    <main class="main-panel">
      <div id="dashboard-panel" class="hidden"></div>

      <div id="explorer-panel">
      <div class="action-bar">
        <button id="btn-upload" class="btn-primary">⬆ Upload</button>
        <button id="btn-mkdir" class="btn-secondary">+ Pasta</button>
        <button id="btn-copy"  class="btn-secondary hidden">📋 Copiar</button>
        <button id="btn-cut"   class="btn-secondary hidden">✂ Recortar</button>
        <button id="btn-paste" class="btn-secondary hidden">📌 Colar aqui</button>
        <span id="item-count" class="item-count"></span>
        <input type="file" id="file-input" style="display:none" multiple>
      </div>

      <div class="filter-bar">
        <div class="filter-group">
          <span class="filter-group-label">Tipo:</span>
          <button class="filter-btn active" data-filter-type="all">Todos</button>
          <button class="filter-btn" data-filter-type="dir">Pastas</button>
          <button class="filter-btn" data-filter-type="doc">Docs</button>
          <button class="filter-btn" data-filter-type="sheet">Planilhas</button>
          <button class="filter-btn" data-filter-type="pdf">PDFs</button>
          <button class="filter-btn" data-filter-type="img">Imagens</button>
        </div>
        <div class="filter-group">
          <span class="filter-group-label">Data:</span>
          <button class="filter-btn active" data-filter-date="all">Qualquer</button>
          <button class="filter-btn" data-filter-date="today">Hoje</button>
          <button class="filter-btn" data-filter-date="week">Esta semana</button>
          <button class="filter-btn" data-filter-date="month">Este mês</button>
        </div>
      </div>

      <div id="kpi-bar" class="kpi-bar hidden">
        <span id="kpi-files"    class="kpi-item"></span>
        <span id="kpi-folders"  class="kpi-item"></span>
        <span id="kpi-size"     class="kpi-item"></span>
        <span id="kpi-modified" class="kpi-item"></span>
      </div>

      <div id="drop-overlay" class="drop-overlay hidden">Solte para fazer upload</div>
      <div id="file-list" class="file-list list-view"></div>
      </div><!-- /explorer-panel -->
    </main>
  </div>

  <!-- Modal genérico (confirmar / renomear) -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <p id="modal-msg"></p>
      <input type="text" id="modal-input" class="hidden">
      <div class="modal-actions">
        <button id="modal-confirm" class="btn-primary">Confirmar</button>
        <button id="modal-cancel"  class="btn-secondary">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Modal de compartilhamento -->
  <div id="share-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3 class="modal-title">Compartilhar pasta</h3>
      <p id="share-modal-path" class="modal-subtitle"></p>
      <label class="form-label">Nome para o destinatário</label>
      <input type="text" id="share-display-name" placeholder="Ex: Pagamentos Financeiro">
      <label class="form-label">Usuário(s) — separados por vírgula</label>
      <input type="text" id="share-recipients"   placeholder="Ex: joao.silva, maria.costa">
      <div class="modal-actions">
        <button id="share-confirm" class="btn-primary">Compartilhar</button>
        <button id="share-cancel"  class="btn-secondary">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
